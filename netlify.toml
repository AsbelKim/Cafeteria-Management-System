[build]
  # Copy static assets to public/ so Netlify CDN serves them directly
  command = "mkdir -p public/static && cp -r app/static/. public/static/"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  PYTHON_VERSION = "3.11"

# Bundle the Flask app package and SSL cert into the function zip
[functions]
  included_files = ["app/**", "certs/**"]

# Route every request through the serverless Flask function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server/:splat"
  status = 200
