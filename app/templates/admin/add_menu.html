{% extends 'base.html' %}
{% block title %}Add Menu — UEAB Cafeteria{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mt-4 mb-4">
  <h4 class="fw-bold mb-0">Add New Menu</h4>
  <a href="{{ url_for('admin.menus') }}" class="btn btn-outline-secondary btn-sm">Back</a>
</div>

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('admin.add_menu') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Date</label>
            <input type="date" name="date" class="form-control" required
                   value="{{ today.strftime('%Y-%m-%d') }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Meal Type</label>
            <select name="meal_type" class="form-select" required>
              <option value="">Select meal...</option>
              <option value="breakfast">Breakfast</option>
              <option value="lunch">Lunch</option>
              <option value="dinner">Dinner</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">
              Description <span class="text-muted fw-normal">(optional)</span>
            </label>
            <textarea name="description" class="form-control" rows="2"
                      placeholder="e.g. Special Sunday lunch"></textarea>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Menu Items</label>
            <div id="itemsContainer">
              <div class="input-group mb-2">
                <input type="text" name="items[]" class="form-control" placeholder="e.g. Ugali with beef stew">
                <button type="button" class="btn btn-outline-danger" onclick="removeItem(this)">Remove</button>
              </div>
            </div>
            <button type="button" class="btn btn-outline-secondary btn-sm mt-1" onclick="addItem()">
              + Add Item
            </button>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">Save Menu</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
function addItem() {
  const container = document.getElementById('itemsContainer');
  const div = document.createElement('div');
  div.className = 'input-group mb-2';
  div.innerHTML = `
    <input type="text" name="items[]" class="form-control" placeholder="Menu item">
    <button type="button" class="btn btn-outline-danger" onclick="removeItem(this)">Remove</button>`;
  container.appendChild(div);
  div.querySelector('input').focus();
}
function removeItem(btn) {
  const container = document.getElementById('itemsContainer');
  if (container.querySelectorAll('.input-group').length > 1)
    btn.closest('.input-group').remove();
}
</script>
{% endblock %}
