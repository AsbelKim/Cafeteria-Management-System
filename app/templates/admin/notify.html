{% extends 'base.html' %}
{% block title %}Send Notification — UEAB Cafeteria{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mt-4 mb-4">
  <h4 class="fw-bold mb-0">Send Notification</h4>
  <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary btn-sm">Back</a>
</div>

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <p class="text-muted small mb-4">
          This will send a notification to all active students.
        </p>
        <form method="POST" action="{{ url_for('admin.send_notification') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Title</label>
            <input type="text" name="title" class="form-control" required
                   placeholder="e.g. Reminder: Confirm your lunch attendance">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Message</label>
            <textarea name="message" class="form-control" rows="4" required
                      placeholder="e.g. Please confirm your attendance for today's lunch by 11:00 AM."></textarea>
          </div>
          <button type="submit" class="btn btn-warning fw-semibold w-100 py-2">
            Send to All Students
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
