{% extends 'base.html' %}
{% block title %}Change Password — UEAB Cafeteria{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-header fw-semibold">
        <i class="fas fa-key me-2 text-primary"></i>Change Password
      </div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('auth.profile_change_password') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Current Password</label>
            <div class="input-group">
              <input type="password" name="current_password" id="currentPw" class="form-control"
                     placeholder="Your current password" required autofocus>
              <button type="button" class="btn btn-outline-secondary" onclick="togglePw('currentPw', this)">Show</button>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">New Password</label>
            <div class="input-group">
              <input type="password" name="new_password" id="newPw" class="form-control"
                     placeholder="Min. 8 characters" required minlength="8"
                     oninput="checkStrength(this.value)">
              <button type="button" class="btn btn-outline-secondary" onclick="togglePw('newPw', this)">Show</button>
            </div>
            <div class="mt-2" id="strengthBar" style="height:4px;border-radius:2px;background:#e2e8f0;">
              <div id="strengthFill" style="height:100%;border-radius:2px;width:0;transition:width 0.3s,background 0.3s;"></div>
            </div>
            <small id="strengthLabel" class="text-muted"></small>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm New Password</label>
            <div class="input-group">
              <input type="password" name="confirm_password" id="confirmPw" class="form-control"
                     placeholder="Repeat new password" required minlength="8">
              <button type="button" class="btn btn-outline-secondary" onclick="togglePw('confirmPw', this)">Show</button>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary fw-semibold flex-grow-1">Update Password</button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePw(fieldId, btn) {
  const f = document.getElementById(fieldId);
  if (f.type === 'password') { f.type = 'text'; btn.textContent = 'Hide'; }
  else { f.type = 'password'; btn.textContent = 'Show'; }
}
function checkStrength(val) {
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[a-z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const fill = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');
  const colors = ['#ef4444','#f59e0b','#f59e0b','#10b981','#1a6e3c'];
  const labels = ['Very weak','Weak','Fair','Good','Strong'];
  fill.style.width = (score * 20) + '%';
  fill.style.background = colors[score - 1] || '#e2e8f0';
  label.textContent = val.length ? labels[score - 1] || '' : '';
  label.style.color = colors[score - 1] || '';
}
</script>
{% endblock %}
