{% extends 'base.html' %}
{% block title %}Register — UEAB Cafeteria{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card card shadow-lg">
    <div class="auth-header text-center">
      <h4 class="mb-1 fw-bold">Create Account</h4>
      <p class="text-white-50 small mb-0">UEAB Cafeteria System</p>
    </div>
    <div class="card-body p-4">
      <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="Faith Chepchumba" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@ueab.ac.ke" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">
            Student ID <span class="text-muted fw-normal">(optional)</span>
          </label>
          <input type="text" name="student_id" class="form-control" placeholder="e.g. SCHEFA2312">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Confirm Password</label>
          <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-success w-100 fw-semibold py-2">Create Account</button>
      </form>
      <hr>
      <p class="text-center text-muted mb-0 small">
        Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
