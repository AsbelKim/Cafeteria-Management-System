{% extends 'base.html' %}
{% block title %}Login — UEAB Cafeteria{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card card shadow-lg">
    <div class="auth-header text-center">
      <h4 class="mb-1 fw-bold">UEAB Cafeteria System</h4>
      <p class="text-white-50 small mb-0">Sign in to your account</p>
    </div>
    <div class="card-body p-4">
      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@ueab.ac.ke" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <input type="password" name="password" id="passwordField" class="form-control" placeholder="••••••••" required>
            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">Show</button>
          </div>
        </div>
        <div class="mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="remember" id="remember">
            <label class="form-check-label text-muted small" for="remember">Remember me</label>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">Sign In</button>
      </form>
      <hr>
      <p class="text-center text-muted mb-0 small">
        Contact admin or staff to get your account created.
      </p>
    </div>
  </div>
</div>

<script>
function togglePassword() {
  const f = document.getElementById('passwordField');
  const btn = f.nextElementSibling;
  if (f.type === 'password') { f.type = 'text'; btn.textContent = 'Hide'; }
  else { f.type = 'password'; btn.textContent = 'Show'; }
}
</script>
{% endblock %}
